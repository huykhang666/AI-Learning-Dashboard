name: CD — Build Docker & Deploy

# Chỉ chạy khi push lên main (tức là sau khi merge PR)
on:
  push:
    branches: [main]
  workflow_dispatch:   # Nút bấm trigger thủ công trên GitHub UI

env:
  REGISTRY: ghcr.io
  # Image tên theo repo: ghcr.io/huykhang666/ai-learning-dashboard-backend
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/ai-learning-dashboard

jobs:
  # ─────────────────────────────────────────────
  # BUILD & PUSH 3 Docker images lên ghcr.io
  # ─────────────────────────────────────────────
  build-push:
    name: "Build & Push Docker Images"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # Cần để push lên ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login vào GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # GitHub tự inject, không cần tạo

      # ── Backend (Spring Boot) ──────────────────
      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: .                    # Root — có pom.xml + src/
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:latest
            ${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend (React/Vite → Nginx) ──────────
      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:latest
            ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── AI Service (FastAPI) ───────────────────
      - name: Build & push ai-service image
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-ai-service:latest
            ${{ env.IMAGE_PREFIX }}-ai-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # DEPLOY lên VPS qua SSH
  # (Dùng từ tuần 12 trở đi khi có VPS)
  # ─────────────────────────────────────────────
  deploy:
    name: "Deploy to VPS"
    needs: build-push        # Chờ build xong mới deploy
    runs-on: ubuntu-latest
    environment: production  # Có thể bật "Required reviewers" trên GitHub

    steps:
      - uses: actions/checkout@v4

      - name: SSH vào VPS và deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/ai-learning-dashboard

            # Kéo docker-compose.yaml mới nhất
            git pull origin main

            # Đăng nhập ghcr.io trên server
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull 3 images mới → restart
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Dọn images cũ để tiết kiệm disk
            docker image prune -f
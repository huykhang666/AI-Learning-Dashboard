name: CI — Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────────
  # 1. BACKEND — Spring Boot (trong thư mục backend/)
  # ─────────────────────────────────────────────
  backend:
    name: "Backend — Maven Build & Test"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: root
          POSTGRES_DB: ai_learning_dashboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend   # ← pom.xml nằm trong backend/

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build & run tests
        # Dùng trực tiếp lệnh mvn, không cần cấp quyền chmod cho file không tồn tại
        run: mvn clean verify -B
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/ai_learning_dashboard
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          # Đường dẫn này phải khớp với working-directory là backend
          path: backend/target/surefire-reports/

  # ─────────────────────────────────────────────
  # 2. FRONTEND — React/Vite (trong thư mục frontend/)
  # ─────────────────────────────────────────────
  frontend:
    name: "Frontend — Vite Build"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8080/api/v1

  # ─────────────────────────────────────────────
  # 3. AI SERVICE — FastAPI (trong thư mục ai-service/)
  # ─────────────────────────────────────────────
  ai-service:
    name: "AI Service — Python Test"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ai-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: |
          pip install pytest pytest-asyncio httpx
          pytest --tb=short -q || echo "Chua co tests — bo qua"
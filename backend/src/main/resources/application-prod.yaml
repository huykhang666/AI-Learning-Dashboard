spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: create

  cache:
    type: redis
    redis:
      time-to-live: 24h
      fail-on-read-error: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - email
              - profile
  mail:
    host: smtp.gmail.com
    port: 587
    username: 6551071010@st.utc2.edu.vn
    password: jtwg bssc vqbu ynvn
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  forward-headers-strategy: framework

jwt:
  signerKey: ${JWT_SIGNER_KEY}

ai:
  service:
    url: ${AI_SERVICE_URL}

app:
  oauth2:
    authorizedRedirectUri: ${OAUTH2_REDIRECT_URI}
  dir:
    uploads: uploads
  frontend:
    url: http://192.168.1.13:5173

vnpay:
  tmn-code: ${VNPAY_TMN_CODE}
  secret-key: ${VNPAY_SECRET_KEY}
  pay-url: ${VNPAY_PAY_URL}
  return-url: ${VNPAY_RETURN_URL}
  ipn-url: ${VNPAY_IPN_URL}

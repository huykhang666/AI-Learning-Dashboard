server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── 1. ĐỊNH TUYẾN REQ API SANG JAVA BACKEND (Thêm dấu / chuẩn hóa)
    location /api/ {
        proxy_pass http://ai-learning-backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Tăng timeout tránh đóng kết nối khi xử lý tác vụ nặng
        proxy_connect_timeout 90s;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    # ── 2. ĐỊNH TUYẾN REQ XỬ LÝ AI SANG FASTAPI (Bọc lót sẵn tính năng tóm tắt)
    location /api/ai/ {
        proxy_pass http://ai-learning-ai:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Tăng timeout cực đại vì xử lý AI trích xuất video mất nhiều thời gian
        proxy_connect_timeout 600s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # Cho phép upload file video bài giảng dung lượng lớn
        client_max_body_size 500M;
    }

    # ── 3. ĐỊNH TUYẾN FRONTEND (React / Vite)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }
}
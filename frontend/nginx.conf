server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Nén Gzip tăng tốc độ load trang web
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    # Cấu hình cache cho file tĩnh 
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /api {
        proxy_pass http://flyspeech-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA Fallback: Tránh lỗi 404 khi người dùng nhấn F5 (Reload) ở trang Dashboard
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }
}
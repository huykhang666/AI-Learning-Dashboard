# ── HTTP: redirect toàn bộ sang HTTPS ──────────────────────────
server {
    listen 80;
    server_name ai-learning-dashboard.id.vn;
    return 301 https://$host$request_uri;
}

# ── HTTPS: main server block ────────────────────────────────────
server {
    listen 443 ssl;
    server_name ai-learning-dashboard.id.vn;

    # SSL cert từ Let's Encrypt (certbot)
    ssl_certificate     /etc/letsencrypt/live/ai-learning-dashboard.id.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai-learning-dashboard.id.vn/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    root  /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Callback về React (KHÔNG proxy sang backend) ──
    location /oauth2/callback {
        try_files $uri $uri/ /index.html;
    }

    # ── OAuth2 authorization: proxy sang backend ──
    location /oauth2/authorization/ {
        proxy_pass http://ai-learning-backend:8080/oauth2/authorization/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── LOGIN OAUTH2 CALLBACK ──
    location /login/ {
        proxy_pass http://ai-learning-backend:8080/login/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── FRONTEND: Định tuyến mặc định ──
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }

    # ── EXAMS SERVICE: Điều hướng /api/api/v1/exams (double prefix) sang api-exam ──
    location /api/api/v1/exams {
        rewrite ^/api/api/v1/exams(.*)$ /api/exams$1 break;
        proxy_pass http://api-exam:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── BACKEND: Điều hướng /api/api (hotfix double prefix) sang Spring Boot ──
    location /api/api {
        rewrite ^/api/api/?(.*)$ /api/$1 break;
        proxy_pass http://ai-learning-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── EXAMS SERVICE: Điều hướng /api/v1/exams sang api-exam ──
    location /api/v1/exams {
        rewrite ^/api/v1/exams(.*)$ /api/exams$1 break;
        proxy_pass http://api-exam:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── BACKEND: Điều hướng /api sang Spring Boot ──
    location /api {
        proxy_pass http://ai-learning-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── WEBSOCKET: Điều hướng /ws sang Spring Boot ──
    location /ws {
        proxy_pass http://ai-learning-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── Điều hướng /uploads sang Spring Boot ──
    location ^~ /uploads {
        proxy_pass http://ai-learning-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── AI SERVICE: Điều hướng /ai sang FastAPI Whisper ──
    location /ai {
        resolver 127.0.0.11 valid=30s;
        set $upstream_ai http://ai-learning-ai:8080;
        proxy_pass $upstream_ai;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_read_timeout 600s;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── GRAFANA ──
    location /grafana {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    client_max_body_size 500M;
}